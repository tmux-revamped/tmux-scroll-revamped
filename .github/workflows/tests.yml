name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats tmux

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core tmux

      - name: Run tests
        run: make test

  test-macos-gnu:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install tmux, bats, and GNU tools
        run: brew install bats-core tmux coreutils gawk gnu-sed grep

      - name: Run tests with GNU tools on PATH
        run: |
          gnubin="$(brew --prefix coreutils)/libexec/gnubin"
          gnubin="${gnubin}:$(brew --prefix gnu-sed)/libexec/gnubin"
          gnubin="${gnubin}:$(brew --prefix grep)/libexec/gnubin"
          gnubin="${gnubin}:$(brew --prefix gawk)/libexec/gnubin"
          export PATH="${gnubin}:${PATH}"
          awk --version | head -1
          sed --version | head -1
          make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck
        run: make lint

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats tmux python3

      - name: Build and install kcov
        run: |
          sudo apt-get install -y -qq cmake binutils-dev libcurl4-openssl-dev \
            libdw-dev libiberty-dev zlib1g-dev libssl-dev g++
          git clone --depth 1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov
          cmake -S /tmp/kcov -B /tmp/kcov/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/kcov/build -j"$(nproc)"
          sudo cmake --install /tmp/kcov/build

      - name: Measure coverage and enforce threshold
        run: make coverage

  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check version consistency
        run: |
          src_ver=$(grep -hoE '[A-Z_]+VERSION="[0-9.]+"' src/lib/utils/constants.sh | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          cl_ver=$(grep -m1 '^## \[' CHANGELOG.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          readme_ver=$(grep -oE 'version-[0-9]+\.[0-9]+\.[0-9]+' README.md | head -1 | sed 's/version-//')
          echo "constants=$src_ver changelog=$cl_ver readme=$readme_ver"
          if [[ -z "$src_ver" ]]; then echo "FAIL: no version constant in constants.sh"; exit 1; fi
          if [[ "$src_ver" != "$cl_ver" ]]; then
            echo "FAIL: constants ($src_ver) != CHANGELOG ($cl_ver)"; exit 1
          fi
          if [[ -n "$readme_ver" && "$src_ver" != "$readme_ver" ]]; then
            echo "FAIL: constants ($src_ver) != README badge ($readme_ver)"; exit 1
          fi

  release:
    needs: [test, test-macos-gnu, lint, coverage, version]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          current_ver=$(grep -hoE '[A-Z_]+VERSION="[0-9.]+"' src/lib/utils/constants.sh | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "current_ver=${current_ver}" >> "$GITHUB_OUTPUT"
          if git tag -l "v${current_ver}" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "v${current_ver} already tagged, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        if: steps.version.outputs.skip == 'false'
        run: |
          ver="${{ steps.version.outputs.current_ver }}"
          awk "/^## \[${ver}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md

      - name: Create release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${{ steps.version.outputs.current_ver }}"
          repo="${GITHUB_REPOSITORY##*/}"
          mkdir -p /tmp/release-staging
          cp -r src README.md CHANGELOG.md LICENSE /tmp/release-staging/
          cp ./*.tmux /tmp/release-staging/ 2>/dev/null || true
          tar czf "${repo}-${ver}.tar.gz" -C /tmp/release-staging .
          gh release create "v${ver}" --target "${GITHUB_SHA}" --title "v${ver}" --notes-file /tmp/release-notes.md "${repo}-${ver}.tar.gz"
