name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats tmux

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core tmux

      - name: Run tests
        run: make test

  test-macos-gnu:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tmux, bats, and GNU tools
        run: brew install bats-core tmux coreutils gawk gnu-sed grep

      - name: Run tests with GNU tools on PATH
        run: |
          gnubin="$(brew --prefix coreutils)/libexec/gnubin"
          gnubin="${gnubin}:$(brew --prefix gnu-sed)/libexec/gnubin"
          gnubin="${gnubin}:$(brew --prefix grep)/libexec/gnubin"
          gnubin="${gnubin}:$(brew --prefix gawk)/libexec/gnubin"
          export PATH="${gnubin}:${PATH}"
          awk --version | head -1
          sed --version | head -1
          make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck
        run: make lint

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats tmux python3

      - name: Build and install kcov
        run: |
          sudo apt-get install -y -qq cmake binutils-dev libcurl4-openssl-dev \
            libdw-dev libiberty-dev zlib1g-dev libssl-dev g++
          git clone --depth 1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov
          cmake -S /tmp/kcov -B /tmp/kcov/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/kcov/build -j"$(nproc)"
          sudo cmake --install /tmp/kcov/build

      - name: Measure coverage and enforce threshold
        run: make coverage
